<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AssemblyAI Transcriber{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --border: #e5e7eb;
        --ring: rgba(37, 99, 235, 0.2);
      }

      body.dark {
        --bg: #0b1220;
        --surface: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: #253041;
        --ring: rgba(129, 140, 248, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 220px);
        color: var(--text);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        z-index: -1;
        border-radius: 999px;
        filter: blur(60px);
        opacity: 0.45;
        pointer-events: none;
      }

      body::before {
        width: 260px;
        height: 260px;
        background: #93c5fd;
        top: -90px;
        left: -80px;
      }

      body::after {
        width: 320px;
        height: 320px;
        background: #c4b5fd;
        right: -110px;
        top: 120px;
      }

      .topbar {
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .topbar-inner {
        max-width: 900px;
        margin: 0 auto;
        padding: 12px 16px;
        font-weight: 700;
        color: #0f172a;
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .logo-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      .card {
        background:
          linear-gradient(160deg, rgba(255, 255, 255, 0.96), rgba(255, 255, 255, 0.86));
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        margin-bottom: 16px;
        opacity: 0;
        animation: fadeUp 0.45s ease forwards;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .card:nth-of-type(2) {
        animation-delay: 0.06s;
      }

      .card:nth-of-type(3) {
        animation-delay: 0.12s;
      }

      .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .btn {
        display: inline-block;
        border: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        color: #fff;
        padding: 10px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition:
          background-color 0.2s ease,
          transform 0.12s ease;
      }

      .btn:hover {
        background: linear-gradient(135deg, #1d4ed8, #4338ca);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px var(--ring);
      }

      .input-file {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin: 10px 0 14px;
        background: #fff;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .input-file:hover {
        border-color: #c7d2fe;
      }

      .input-file:focus-visible {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--ring);
      }

      .drop-zone {
        border: 2px dashed #bfdbfe;
        border-radius: 12px;
        padding: 16px;
        text-align: center;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.7);
        cursor: pointer;
      }

      .drop-zone.is-dragover {
        border-color: #2563eb;
        background: #eff6ff;
        color: #1d4ed8;
      }

      .audio-preview {
        width: 100%;
        margin-top: 8px;
      }

      label {
        font-weight: 600;
        color: #111827;
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #1e40af;
        background: #dbeafe;
        padding: 4px 8px;
        border-radius: 999px;
      }

      .title-gradient {
        background: linear-gradient(135deg, #1d4ed8, #7c3aed);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .content-block {
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text);
        background: linear-gradient(180deg, #fbfdff, #f8fafc);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }

      .toolbar {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }

      .btn-mini {
        border: 1px solid var(--border);
        background: #fff;
        color: #334155;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .theme-toggle {
        border: 1px solid var(--border);
        background: #fff;
        color: #334155;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      body.dark .theme-toggle,
      body.dark .btn-mini {
        background: #0f172a;
        color: #cbd5e1;
      }

      .btn-mini:hover {
        border-color: #c7d2fe;
        color: #1e3a8a;
      }

      .alert {
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #991b1b;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 16px;
      }

      .uploading {
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--muted);
        margin-top: 6px;
      }

      .steps {
        display: none;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 6px;
      }

      .steps.is-visible {
        display: grid;
      }

      .step {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 10px;
        text-align: center;
        font-size: 12px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.8);
      }

      .step.is-active {
        color: #1e3a8a;
        border-color: #bfdbfe;
        background: #dbeafe;
        font-weight: 700;
      }

      .uploading.is-visible {
        display: inline-flex;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid #dbeafe;
        border-top-color: var(--primary);
        animation: spin 0.8s linear infinite;
      }

      .btn.is-loading {
        opacity: 0.85;
        pointer-events: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .page {
          padding-top: 20px;
        }

        .card {
          padding: 16px;
        }

        h1 {
          font-size: 1.5rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }

      body.dark .topbar {
        background: rgba(15, 23, 42, 0.8);
      }

      body.dark .card {
        background: linear-gradient(160deg, rgba(17, 24, 39, 0.96), rgba(15, 23, 42, 0.92));
      }

      body.dark .input-file,
      body.dark .content-block {
        background: #0f172a;
        color: var(--text);
      }

      body.dark .step {
        background: rgba(15, 23, 42, 0.85);
      }

      body.dark .step.is-active {
        color: #dbeafe;
        border-color: #4f46e5;
        background: rgba(79, 70, 229, 0.25);
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="logo-dot" aria-hidden="true"></span>
          <span>AssemblyAI Transcriber</span>
        </div>
        <button id="theme-toggle" class="theme-toggle" type="button">Dark</button>
      </div>
    </header>
    <main class="page">{% block content %}{% endblock %}</main>
    <script>
      (function () {
        const key = "ui-theme";
        const btn = document.getElementById("theme-toggle");
        const saved = localStorage.getItem(key);
        if (saved === "dark") document.body.classList.add("dark");
        if (btn) {
          btn.textContent = document.body.classList.contains("dark") ? "Light" : "Dark";
          btn.addEventListener("click", function () {
            document.body.classList.toggle("dark");
            const dark = document.body.classList.contains("dark");
            localStorage.setItem(key, dark ? "dark" : "light");
            btn.textContent = dark ? "Light" : "Dark";
          });
        }
      })();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
