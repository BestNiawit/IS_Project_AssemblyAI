<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AssemblyAI Transcriber{% endblock %}</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --border: #e5e7eb;
        --ring: rgba(37, 99, 235, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 220px);
        color: var(--text);
        min-height: 100vh;
      }

      .topbar {
        border-bottom: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 20;
      }

      .topbar-inner {
        max-width: 900px;
        margin: 0 auto;
        padding: 12px 16px;
        font-weight: 700;
        color: #0f172a;
      }

      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 16px 48px;
      }

      .card {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        margin-bottom: 16px;
        opacity: 0;
        animation: fadeUp 0.45s ease forwards;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .card:nth-of-type(2) {
        animation-delay: 0.06s;
      }

      .card:nth-of-type(3) {
        animation-delay: 0.12s;
      }

      .card:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.1);
      }

      h1,
      h2,
      h3 {
        margin: 0 0 12px;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .btn {
        display: inline-block;
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        padding: 10px 16px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition:
          background-color 0.2s ease,
          transform 0.12s ease;
      }

      .btn:hover {
        background: var(--primary-hover);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn:focus-visible {
        outline: none;
        box-shadow: 0 0 0 4px var(--ring);
      }

      .input-file {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        margin: 10px 0 14px;
        background: #fff;
        transition:
          border-color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .input-file:hover {
        border-color: #c7d2fe;
      }

      .input-file:focus-visible {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--ring);
      }

      label {
        font-weight: 600;
        color: #111827;
      }

      .stack {
        display: grid;
        gap: 8px;
      }

      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #1e40af;
        background: #dbeafe;
        padding: 4px 8px;
        border-radius: 999px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .content-block {
        white-space: pre-wrap;
        word-break: break-word;
        color: var(--text);
        background: #f9fafb;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px;
      }

      .alert {
        border: 1px solid #fecaca;
        background: #fef2f2;
        color: #991b1b;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 16px;
      }

      .uploading {
        display: none;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--muted);
        margin-top: 6px;
      }

      .uploading.is-visible {
        display: inline-flex;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid #dbeafe;
        border-top-color: var(--primary);
        animation: spin 0.8s linear infinite;
      }

      .btn.is-loading {
        opacity: 0.85;
        pointer-events: none;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .page {
          padding-top: 20px;
        }

        .card {
          padding: 16px;
        }

        h1 {
          font-size: 1.5rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">AssemblyAI Transcriber</div>
    </header>
    <main class="page">{% block content %}{% endblock %}</main>
    {% block scripts %}{% endblock %}
  </body>
</html>
